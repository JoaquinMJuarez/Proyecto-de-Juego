<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra Papel o Tijera</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Piedra, Papel o Tijera</h1>

        <div class="botones">
            <button onclick="jugar('piedra')">
                <img src="img/piedra.png" alt="Piedra">
                <p>Piedra</p>
            </button>

            <button onclick="jugar('papel')">
                <img src="img/papel.png" alt="Papel">
                <p>Papel</p>
            </button>

            <button onclick="jugar('tijera')">
                <img src="img/tijera.png" alt="Tijera">
                <p>Tijera</p>
            </button>
        </div>

        <h2 id="resultado">Elige una opción</h2>

        <p id="eleccionJugador"></p>
        <p id="eleccionPC"></p>

        <!-- Animación de la computadora -->
        <h3>Elección de la computadora</h3>
        <img id="imagenPC" src="img/piedra.png" alt="Computadora">

        <h3>Puntuación</h3>
        <p>Jugador: <span id="puntosJugador">0</span></p>
        <p>Computadora: <span id="puntosPC">0</span></p>

        <button class="reiniciar" onclick="reiniciar()">Reiniciar</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
